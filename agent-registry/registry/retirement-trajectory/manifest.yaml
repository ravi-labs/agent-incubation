# Agent Manifest — Retirement Trajectory Intervention Agent
# ──────────────────────────────────────────────────────────
# This manifest defines the agent's declared scope and permissions.
# It is the artifact that moves through the 6-stage incubation pipeline.
# No effect outside allowed_effects may be invoked by this agent.

agent_id: retirement-trajectory
version: "0.1.0"
owner: participant-outcomes-team
description: >
  Continuously monitors behavioral signals across participants (missed
  contributions, allocation drift, age-to-balance ratio) and autonomously
  delivers personalized plain-language interventions to those at risk of
  a poor retirement outcome. Runs at scale across the full participant base.

lifecycle_stage: BUILD
environment: sandbox

# Effects this agent is permitted to invoke.
# Any effect not listed here will be blocked by the policy engine.
allowed_effects:
  - participant.data.read
  - participant.activity.read
  - participant.cohort.read
  - risk.score.compute
  - intervention.draft
  - participant.communication.send
  - intervention.log.write
  - outcome.log.write
  - audit.log.write

# Named data sources this agent may access via Gateway.
data_access:
  - participant.data
  - participant.activity
  - participant.cohort

# Path to this agent's YAML policy file.
policy_path: examples/retirement_trajectory/policy.yaml

# Success metrics — what "good" looks like after 30 days.
success_metrics:
  - "Intervention engagement rate increases vs. no-intervention control group"
  - "Average contribution rate increases in intervention cohort"
  - "Share of participants below income replacement threshold decreases by ≥5%"
  - "Inbound support contacts about retirement trajectory decrease"

tags:
  - retirement
  - participant-engagement
  - intervention
