# Policy — Retirement Trajectory Intervention Agent
# ──────────────────────────────────────────────────
# Agent-specific rules applied on top of the financial_services/defaults.yaml.
# More restrictive rules here override defaults.
#
# Key restrictions for this agent:
#  - Participant communications are ASK by default (from defaults).
#    Session grants can be pre-authorized by a compliance officer for
#    low-risk informational nudges (no specific dollar amounts).
#  - High-risk message types (specific projections, contribution change
#    recommendations) always require ASK regardless of grants.

version: "0.1.0"

rules:

  # Low-risk informational messages may be pre-authorized via session grant.
  # (The grant pre-authorizes and bypasses the ASK queue for routine nudges.)
  - id: rt-comms-informational
    resource_type: "participant.communication.send"
    effect: "notify"
    decision: ASK
    when:
      message_type: "informational"
    reason: >
      Informational nudges (no specific financial figures). ASK required
      but eligible for session grant pre-authorization by compliance officer.

  # Messages with specific income replacement projections always require review.
  - id: rt-comms-projection
    resource_type: "participant.communication.send"
    effect: "notify"
    decision: ASK
    when:
      message_type: "projection"
    reason: >
      Message contains income replacement percentage or dollar projections.
      Always requires compliance review. Not eligible for session grant bypass.

  # Messages with specific contribution change recommendations always require review.
  - id: rt-comms-recommendation
    resource_type: "participant.communication.send"
    effect: "notify"
    decision: ASK
    when:
      message_type: "contribution_recommendation"
    reason: >
      Message contains a specific contribution rate change recommendation.
      Fiduciary communication standards require human review before delivery.

  # Rate limit: no more than 1 intervention per participant per 30 days.
  # (Enforced via rate_limiter config in the ControlTower setup — see agent.py)
