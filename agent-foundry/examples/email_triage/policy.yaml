# Policy — Email Triage Agent
# ─────────────────────────────
# Tier 1 & 2: always ALLOW — reads and computations are safe
# Tier 3: always ALLOW — drafts are internal
# Tier 4: ticket.create is ASK for P1/P2, ALLOW for P3/P4 (confidence gate in agent)
# Human review queue: always ALLOW — it IS the escalation path

version: "1.0"
agent_id: email-triage

rules:
  # ── Tier 1: reads ────────────────────────────────────────────────────
  - resource_type: "email.read"
    effect: "read"
    decision: ALLOW

  - resource_type: "email.thread.read"
    effect: "read"
    decision: ALLOW

  - resource_type: "ticket.read"
    effect: "read"
    decision: ALLOW

  - resource_type: "knowledge.article.read"
    effect: "read"
    decision: ALLOW

  - resource_type: "knowledge.buddy.query"
    effect: "read"
    decision: ALLOW

  - resource_type: "user.directory.read"
    effect: "read"
    decision: ALLOW

  - resource_type: "sla.config.read"
    effect: "read"
    decision: ALLOW

  # ── Tier 2: computation ───────────────────────────────────────────────
  - resource_type: "email.classify"
    effect: "read"
    decision: ALLOW

  - resource_type: "priority.infer"
    effect: "read"
    decision: ALLOW

  - resource_type: "sentiment.score"
    effect: "read"
    decision: ALLOW

  - resource_type: "duplicate.detect"
    effect: "read"
    decision: ALLOW

  - resource_type: "sla.calculate"
    effect: "read"
    decision: ALLOW

  - resource_type: "routing.decide"
    effect: "read"
    decision: ALLOW

  - resource_type: "entity.extract"
    effect: "read"
    decision: ALLOW

  # ── Tier 3: drafts ────────────────────────────────────────────────────
  - resource_type: "ticket.draft"
    effect: "write"
    decision: ALLOW

  - resource_type: "email.reply.draft"
    effect: "write"
    decision: ALLOW

  - resource_type: "ticket.summary.draft"
    effect: "write"
    decision: ALLOW

  - resource_type: "knowledge.match.draft"
    effect: "write"
    decision: ALLOW

  # ── Tier 4: ticket creation — P1/P2 always ASK ───────────────────────
  - resource_type: "ticket.create"
    effect: "write"
    when:
      priority: "P1"
    decision: ASK

  - resource_type: "ticket.create"
    effect: "write"
    when:
      priority: "P2"
    decision: ASK

  - resource_type: "ticket.create"
    effect: "write"
    decision: ALLOW

  - resource_type: "ticket.update"
    effect: "write"
    decision: ALLOW

  # Human review queue — always ALLOW
  - resource_type: "itsm.human.review.queue.add"
    effect: "notify"
    decision: ALLOW

  # ── Tier 5: persistence ───────────────────────────────────────────────
  - resource_type: "itsm.audit.log.write"
    effect: "write"
    decision: ALLOW

  - resource_type: "triage.log.write"
    effect: "write"
    decision: ALLOW

  - resource_type: "itsm.classification.save"
    effect: "write"
    decision: ALLOW
