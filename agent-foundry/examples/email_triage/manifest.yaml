agent_id: email-triage
version: "0.1.0"
owner: itsm-platform-team
description: >
  Reads incoming emails, classifies intent and priority, queries the
  knowledge base for relevant articles, drafts a ticket, and routes
  to Pega Case Management or ServiceNow. P1/P2 always require human
  approval before ticket creation. P3/P4 auto-create when confidence >= 0.85.

lifecycle_stage: BUILD
environment: sandbox

allowed_effects:
  # Tier 1 — reads
  - email.read
  - email.thread.read
  - ticket.read
  - knowledge.article.read
  - knowledge.buddy.query
  - user.directory.read
  - sla.config.read

  # Tier 2 — computation
  - email.classify
  - priority.infer
  - sentiment.score
  - duplicate.detect
  - sla.calculate
  - routing.decide
  - entity.extract

  # Tier 3 — drafts (internal)
  - ticket.draft
  - email.reply.draft
  - ticket.summary.draft
  - knowledge.match.draft

  # Tier 4 — output (governed)
  - ticket.create
  - ticket.update
  - itsm.human.review.queue.add

  # Tier 5 — persistence
  - itsm.audit.log.write
  - triage.log.write
  - itsm.classification.save

data_access:
  - email.inbox
  - email.thread
  - user.directory
  - knowledge.articles
  - sla.config
  - ticket.system

policy_path: examples/email_triage/policy.yaml

success_metrics:
  - "Email classification accuracy >= 90%"
  - "P1/P2 escalation rate >= 95%"
  - "Duplicate detection rate >= 85%"
  - "Audit completeness = 100%"
  - "Zero unauthorised external sends"

tags:
  - itsm
  - email-triage
  - pega
  - servicenow
