# Integration test agent manifest
agent_id: integration-test-agent
version: "0.1.0"
owner: foundry-test-team
description: "Minimal agent used to exercise the full foundry pipeline in integration tests"

lifecycle_stage: BUILD
environment: sandbox
status: active

foundry_version: ">=0.1.0"

allowed_effects:
  - participant.data.read
  - risk.score.compute
  - intervention.draft
  - intervention.log.write
  - participant.communication.send
  - audit.log.write
  - fund.performance.read
  - fund.fees.read
  - compliance.evaluate
  - finding.draft
  - compliance.finding.emit.low
  - compliance.finding.emit.high
  - human.review.queue.add
  - finding.log.write
  # Included so DENY is enforced at ControlTower (not manifest check):
  - participant.data.write
  - account.transaction.execute

data_access:
  - participant.data
  - fund.data

policy_path: tests/integration/fixtures/policy.yaml

success_metrics:
  - "Integration tests pass 100% of the time"
