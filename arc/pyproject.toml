[tool.uv.workspace]
members = [
    "packages/arc-core",
    "packages/arc-harness",
    "packages/arc-orchestrators",
    "packages/arc-connectors",
    "packages/arc-runtime",
    "packages/arc-platform",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.11"
strict = true
