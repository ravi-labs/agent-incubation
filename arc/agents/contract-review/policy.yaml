# Policy — Contract Review Agent
# ────────────────────────────────
# Governs UPL-sensitive effects. Tier 4 (output/external) effects require
# attorney review before any content leaves the system.
#
# Rule format:
#   resource_type — domain effect value (e.g. "clause.risk.score")
#   effect        — Tollgate base effect (e.g. "read", "write", "notify")
#   decision      — ALLOW | ASK | DENY
#   when          — optional metadata conditions

version: "1.0"
agent_id: contract-reviewer

rules:
  # Tier 1 — Data reads are always allowed
  - resource_type: "contract.read"
    effect: "read"
    decision: ALLOW

  - resource_type: "regulation.read"
    effect: "read"
    decision: ALLOW

  - resource_type: "precedent.read"
    effect: "read"
    decision: ALLOW

  # Tier 2 — Computations are always allowed
  - resource_type: "clause.risk.score"
    effect: "read"
    decision: ALLOW

  - resource_type: "compliance.gap.identify"
    effect: "read"
    decision: ALLOW

  - resource_type: "entity.extraction.run"
    effect: "read"
    decision: ALLOW

  - resource_type: "deadline.calculate"
    effect: "read"
    decision: ALLOW

  # Tier 3 — Drafts are internal, always allowed
  - resource_type: "redline.draft"
    effect: "write"
    decision: ALLOW

  - resource_type: "contract.summary.draft"
    effect: "write"
    decision: ALLOW

  - resource_type: "legal.memo.draft"
    effect: "write"
    decision: ALLOW

  # Tier 4 — High-risk contracts require attorney review before summary send
  - resource_type: "review.summary.send"
    effect: "notify"
    when:
      risk_level: "high"
    decision: ASK

  - resource_type: "review.summary.send"
    effect: "notify"
    decision: ALLOW

  # Compliance alerts: high-severity always require attorney review
  - resource_type: "compliance.alert.send"
    effect: "notify"
    when:
      severity: "high"
    decision: ASK

  - resource_type: "compliance.alert.send"
    effect: "notify"
    decision: ALLOW

  # Human review queue — always allowed (it IS the escalation path)
  - resource_type: "legal.human.review.queue.add"
    effect: "notify"
    decision: ALLOW

  # Tier 5 — Persistence always allowed
  - resource_type: "legal.audit.log.write"
    effect: "write"
    decision: ALLOW

  - resource_type: "matter.interaction.log.write"
    effect: "write"
    decision: ALLOW

  - resource_type: "document.classification.save"
    effect: "write"
    decision: ALLOW

  - resource_type: "deadline.record"
    effect: "write"
    decision: ALLOW
