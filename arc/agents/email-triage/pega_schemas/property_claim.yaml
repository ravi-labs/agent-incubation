# ──────────────────────────────────────────────────────────────────────────────
# Pega case-type schema: PropertyClaim
#
# Maintained by:  claims-operations-team + Pega platform team
# Last reviewed:  2026-04-30
# Pega case type: ITSM-Work-PropertyClaim
# ──────────────────────────────────────────────────────────────────────────────

case_type:      property
pega_class:     ITSM-Work-PropertyClaim
schema_version: "1.0"

mapping:
  policy_number:           Content.PolicyNumber
  claim_amount:            Content.D_FinancialDetails.TotalAmount
  incident_date:           IncidentDate
  property_address.line1:  Content.PropertyDetails.AddressLine1
  property_address.line2:  Content.PropertyDetails.AddressLine2
  property_address.city:   Content.PropertyDetails.City
  property_address.zip:    Content.PropertyDetails.PostalCode
  damage_type:             Content.DamageType
  claimant.email:          AssignedTo.Email
  claimant.name:           AssignedTo.DisplayName
  routing.team:            pyAssignedToOperator
  triage.severity:         Content.Severity

required:
  - Content.PropertyDetails.AddressLine1
  - Content.PropertyDetails.PostalCode
  - IncidentDate
  - Content.PolicyNumber
  - Content.DamageType

defaults:
  pyStatusWork:   Open
  pyOrigin:       arc-email-triage
  pyOperatorID:   arc-bot
  Channel:        email

transforms:
  claim_amount:
    type:   round
    digits: 2
