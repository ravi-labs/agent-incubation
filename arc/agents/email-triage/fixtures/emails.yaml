  knowledge.articles:
    "portal-down":
      id: "KB-001"
      title: "Troubleshooting portal 503 errors"
      content: "Check load balancer health, verify database connections, review recent deployments"
      relevance_tags: ["503", "portal", "down", "production"]
    "api-timeout":
      id: "KB-002"
      title: "API timeout troubleshooting guide"
      content: "Common causes: connection pool exhaustion, slow queries, network latency. Check APM dashboard."
      relevance_tags: ["timeout", "504", "api", "integration"]
    "user-management":
      id: "KB-003"
      title: "How to add users to your account"
      content: "Navigate to Settings > Team > Add Member. Enter email address and select role."
      relevance_tags: ["user", "add", "admin", "settings"]
