# ──────────────────────────────────────────────────────────────────────────────
# Retirement-Plan Email-Triage Agent — Synthetic Fixture Data
# ──────────────────────────────────────────────────────────────────────────────
#
# Six fixture emails — two per Pega case type — exercising every gate:
#
#   distribution_request:
#     RM-001  Routine rollover                   → ALLOW
#     RM-002  Large lump-sum at termination       → ASK (>$25k threshold)
#
#   loan_hardship_request:
#     RM-003  Standard 401(k) loan               → ALLOW
#     RM-004  Hardship withdrawal (medical)      → ASK (all hardships gated)
#
#   sponsor_inquiry:
#     RM-005  General contribution-upload issue   → ALLOW
#     RM-006  ERISA compliance question          → ASK (compliance gate)
#
# Bonus: sender of RM-001 has fraud_flag=true in user.directory below — that
# triggers the policy's hard-DENY rule, demonstrating the safety net.
#
# Used by the harness for local dev and eval suites.

sources:
  email.inbox:

    # ── 1. Distribution: routine rollover (low value, ALLOW path) ───────────
    - id: "RM-001"
      subject: "Rollover request from my 401(k) at PLAN-9001"
      body: >
        Hi, I'd like to roll over my 401(k) balance to my IRA at Fidelity.
        My participant ID is P-12345 and the plan is PLAN-9001. The balance
        is approximately $4,500. Please process the rollover and let me
        know what paperwork I need to sign. My account number at Fidelity
        is 999-888-777. Incident date: 2026-04-30.
      sender: "alice.rollover@example.com"
      sender_name: "Alice Rollover"
      received_at: "2026-04-30T10:15:00Z"
      department: "Participant Services"
      expected_case_type: "distribution"
      expected_subtype:   "rollover"

    # ── 2. Distribution: high-value lump-sum at termination (ASK path) ──────
    - id: "RM-002"
      subject: "Lump sum distribution — leaving the company"
      body: >
        I'm leaving the company at the end of next week and want to take
        my entire 401(k) balance as a lump sum distribution. My
        participant ID is P-77821 and the plan is PLAN-9001. The current
        balance is around $145,000. Please confirm tax withholding
        details and the timeline. Incident date: 2026-04-29.
      sender: "bob.terminating@example.com"
      sender_name: "Bob Terminator"
      received_at: "2026-04-29T14:22:00Z"
      department: "Participant Services"
      expected_case_type: "distribution"
      expected_subtype:   "lump_sum"

    # ── 3. Loan / Hardship: standard 401(k) loan (low value, ALLOW path) ─
    - id: "RM-003"
      subject: "Request for a 401(k) loan"
      body: >
        I'd like to take a loan against my 401(k) for some unexpected
        expenses. Participant P-44210, plan PLAN-9001. Loan amount:
        $12,500. Repayment over 60 months via payroll. Please confirm
        the application steps. Incident date: 2026-04-30.
      sender: "carol.loan@example.com"
      sender_name: "Carol Borrower"
      received_at: "2026-04-30T09:05:00Z"
      department: "Participant Services"
      expected_case_type: "loan_hardship"
      expected_subtype:   "loan"

    # ── 4. Loan / Hardship: medical hardship withdrawal (always ASK) ─────
    - id: "RM-004"
      subject: "Hardship withdrawal — medical bills"
      body: >
        My spouse was hospitalized last month and we have $18,000 in
        out-of-pocket medical bills not covered by insurance. I need to
        take a hardship withdrawal from my 401(k) to cover them. I have
        attached the hospital documentation. Participant P-30015, plan
        PLAN-9001. Incident date: 2026-04-28.
      sender: "dan.medical@example.com"
      sender_name: "Dan Medical"
      received_at: "2026-04-28T16:40:00Z"
      department: "Participant Services"
      expected_case_type: "loan_hardship"
      expected_subtype:   "hardship"

    # ── 5. Sponsor inquiry: contribution upload failure (ALLOW path) ─────
    - id: "RM-005"
      subject: "Contribution upload failed for the April payroll"
      body: >
        Hi, our weekly contribution upload for April payroll failed with
        a validation error. We're the plan sponsor for PLAN-9001 and the
        sponsor ID is SPONSOR-ACME. Could the operations team look at
        the failed file and tell us what to fix? Deferral correction may
        also be needed. Incident date: 2026-04-29.
      sender: "ops@acme-employer.com"
      sender_name: "Acme HR Operations"
      received_at: "2026-04-29T12:00:00Z"
      department: "Plan Sponsor Services"
      expected_case_type: "sponsor_inquiry"
      expected_subtype:   "contribution"

    # ── 6. Sponsor inquiry: ERISA compliance question (ASK path) ─────────
    - id: "RM-006"
      subject: "ADP test failure — need ERISA compliance guidance"
      body: >
        Our ADP test for the 2025 plan year failed by a wider margin
        than expected. We need ERISA compliance guidance on the
        corrective options (refunds vs QNECs vs safe-harbor amendment).
        Sponsor SPONSOR-ACME, plan PLAN-9001. The 5500 filing deadline
        is approaching. Please escalate to ERISA counsel.
      sender: "compliance@acme-employer.com"
      sender_name: "Acme Compliance Team"
      received_at: "2026-04-30T08:30:00Z"
      department: "Plan Sponsor Services"
      expected_case_type: "sponsor_inquiry"
      expected_subtype:   "compliance"

  # ── Participant + sponsor directory ──────────────────────────────────────
  user.directory:
    alice.rollover@example.com:
      name:        "Alice Rollover"
      tier:        "standard"
      vip:         false
      fraud_flag:  false
      participant_id: "P-12345"
      plan_id:     "PLAN-9001"
    bob.terminating@example.com:
      name:        "Bob Terminator"
      tier:        "standard"
      vip:         false
      fraud_flag:  false
      participant_id: "P-77821"
      plan_id:     "PLAN-9001"
    carol.loan@example.com:
      name:        "Carol Borrower"
      tier:        "standard"
      vip:         false
      fraud_flag:  false
      participant_id: "P-44210"
      plan_id:     "PLAN-9001"
    dan.medical@example.com:
      name:        "Dan Medical"
      tier:        "standard"
      vip:         false
      fraud_flag:  false
      participant_id: "P-30015"
      plan_id:     "PLAN-9001"
    ops@acme-employer.com:
      name:           "Acme HR Operations"
      role:           "sponsor_admin"
      sponsor_id:     "SPONSOR-ACME"
      sponsor_company: "Acme Industries Inc."
    compliance@acme-employer.com:
      name:           "Acme Compliance Team"
      role:           "sponsor_compliance"
      sponsor_id:     "SPONSOR-ACME"
      sponsor_company: "Acme Industries Inc."

  # ── Recent-cases index (used by the duplicate-detect node) ──────────────
  ticket.system:
    by_participant:
      P-12345: []
      P-77821: []
      P-44210: []
      P-30015: []
