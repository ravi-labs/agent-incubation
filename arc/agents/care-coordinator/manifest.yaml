# Agent Manifest — Care Coordinator Agent
# ─────────────────────────────────────────
# Identifies care gaps in a patient population, drafts outreach messages,
# and routes high-risk referrals through human clinical review (ASK).
#
# Taxonomy: HealthcareEffect (HIPAA)
# Taxonomy Steward role: HIPAA Privacy Officer
# Manifest Approver role: Security Officer / Clinical Informatics lead

agent_id: care-coordinator
version: "0.1.0"
owner: clinical-programs-team
description: >
  Scans a patient population for preventive care gaps (overdue screenings,
  missed vaccinations, untreated chronic conditions), scores each patient
  by gap severity, drafts personalised outreach messages, and routes
  high-severity cases to the human clinical review queue for sign-off
  before any communication is sent.

lifecycle_stage: BUILD
environment: sandbox

# Effects this agent is permitted to invoke.
# Any effect not listed here is implicitly denied.
# Hard-deny effects (patient.record.write, patient.record.delete,
# clinical.order.execute) cannot appear here — they are unconditional.
allowed_effects:
  - patient.record.read
  - patient.demographics.read
  - patient.claims.read
  - patient.lab.results.read
  - patient.medications.read
  - clinical.guidelines.read
  - care.gap.identify
  - risk.stratification.compute
  - drug.interaction.check
  - clinical.summary.draft
  - care.plan.draft
  - care.gap.alert.send
  - human.review.queue.add
  - audit.log.write
  - care.interaction.log.write

data_access:
  - patient.records
  - clinical.guidelines
  - care.gap.rules

policy_path: examples/care_coordinator/policy.yaml

success_metrics:
  - "Care gap closure rate >= 15% within 90 days of outreach"
  - "Human review escalation rate < 20% of total outreach volume"
  - "Zero unauthorised PHI disclosures"
  - "Audit log completeness: 100% of effects logged"

tags:
  - healthcare
  - hipaa
  - care-management
  - population-health
