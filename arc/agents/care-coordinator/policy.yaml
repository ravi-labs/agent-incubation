# Policy — Care Coordinator Agent
# ─────────────────────────────────
# Governs HIPAA-regulated effects. Tier 4 (output/external) effects
# require human review for high-severity patients.
#
# Rule format:
#   resource_type — domain effect value (e.g. "care.gap.identify")
#   effect        — Tollgate base effect (e.g. "read", "write", "notify")
#   decision      — ALLOW | ASK | DENY
#   when          — optional metadata conditions

version: "1.0"
agent_id: care-coordinator

rules:
  # Tier 1 & 2 — Data reads and computations are always allowed
  - resource_type: "patient.record.read"
    effect: "read"
    decision: ALLOW

  - resource_type: "patient.demographics.read"
    effect: "read"
    decision: ALLOW

  - resource_type: "patient.claims.read"
    effect: "read"
    decision: ALLOW

  - resource_type: "patient.lab.results.read"
    effect: "read"
    decision: ALLOW

  - resource_type: "patient.medications.read"
    effect: "read"
    decision: ALLOW

  - resource_type: "clinical.guidelines.read"
    effect: "read"
    decision: ALLOW

  - resource_type: "care.gap.identify"
    effect: "read"
    decision: ALLOW

  - resource_type: "risk.stratification.compute"
    effect: "read"
    decision: ALLOW

  - resource_type: "drug.interaction.check"
    effect: "read"
    decision: ALLOW

  # Tier 3 — Drafts are internal, always allowed
  - resource_type: "clinical.summary.draft"
    effect: "write"
    decision: ALLOW

  - resource_type: "care.plan.draft"
    effect: "write"
    decision: ALLOW

  # Tier 4 — High-severity outreach requires human review (ASK)
  #          Low-severity automated outreach is allowed
  - resource_type: "care.gap.alert.send"
    effect: "notify"
    when:
      severity: "high"
    decision: ASK

  - resource_type: "care.gap.alert.send"
    effect: "notify"
    decision: ALLOW

  # Human review queue — always allowed (it IS the escalation path)
  - resource_type: "human.review.queue.add"
    effect: "notify"
    decision: ALLOW

  # Tier 5 — Persistence always allowed
  - resource_type: "audit.log.write"
    effect: "write"
    decision: ALLOW

  - resource_type: "care.interaction.log.write"
    effect: "write"
    decision: ALLOW
