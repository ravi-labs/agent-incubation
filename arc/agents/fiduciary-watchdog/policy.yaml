# Policy — Fiduciary Watchdog Agent
# ─────────────────────────────────────────────────────────────────────────────
# This policy is layered on top of policies/financial_services/defaults.yaml
# and erisa.yaml. Rules here may TIGHTEN defaults but not loosen them.
#
# Fiduciary Watchdog rationale:
#   - High-severity findings always require human review (tighter than default)
#   - Low-severity findings can auto-emit to dashboard (matches default)
#   - We explicitly require the human review queue for high-severity findings
#     before formal emission, creating a two-step paper trail for ERISA §404
# ─────────────────────────────────────────────────────────────────────────────

rules:

  # High-severity compliance findings always go to human review queue first.
  # The watchdog DRAFTS the finding and queues it; a compliance officer formally
  # emits it. This creates the ERISA §404(a) "process documentation" requirement.
  - resource_type: "compliance.finding.emit.high"
    decision: ASK
    reason: >
      High-severity findings may trigger plan correction obligations or DOL
      reporting. Always route to human review before formal emission.
    when:
      manifest_version: "fiduciary-watchdog@*"

  # Low-severity findings auto-emit to monitoring dashboard.
  # These are informational and do not trigger regulatory reporting.
  - resource_type: "compliance.finding.emit.low"
    decision: ALLOW
    reason: >
      Low-severity findings (informational monitoring, early-warning signals)
      auto-emit to the compliance dashboard for analyst triage. No regulatory
      reporting obligation — auto-emission is appropriate.
    when:
      manifest_version: "fiduciary-watchdog@*"

  # Human review queue add is always permitted — this is the intake step
  # before a compliance officer reviews a high-severity finding.
  - resource_type: "human.review.queue.add"
    decision: ALLOW
    reason: >
      Adding to the human review queue is always permitted and is the
      required first step before emitting high-severity findings.
    when:
      manifest_version: "fiduciary-watchdog@*"
