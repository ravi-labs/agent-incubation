# Agent Manifest — Fiduciary Watchdog Agent
# ──────────────────────────────────────────────────────────────────────────────
# Monitors plan-level fund lineups continuously for ERISA compliance risks:
# excessive fees, persistent underperformance, style drift, and benchmark
# misalignment. Emits findings to the compliance dashboard and queues
# high-severity issues for fiduciary review.

agent_id: fiduciary-watchdog
version: "0.1.0"
owner: compliance-and-fiduciary-team
description: >
  Continuously monitors every plan's investment fund lineup against ERISA §404(a)
  prudence standards. Evaluates fund fees versus benchmarks, trailing performance,
  style consistency, and expense ratio reasonableness. Emits tiered compliance
  findings — low-severity to the monitoring dashboard (auto), high-severity to
  the fiduciary review queue (human approval required). Designed to surface
  ERISA §404(a) risk before DOL examinations, not after.

lifecycle_stage: BUILD
environment: sandbox
status: active

team_repo: https://github.com/ravi-labs/compliance-agents
arc_version: ">=0.1.0"

allowed_effects:
  - plan.data.read
  - fund.performance.read
  - fund.fees.read
  - compliance.evaluate
  - finding.draft
  - compliance.finding.emit.low
  - compliance.finding.emit.high
  - finding.log.write
  - human.review.queue.add
  - audit.log.write

data_access:
  - plan.data
  - fund.performance
  - fund.fees
  - benchmark.data

policy_path: examples/fiduciary_watchdog/policy.yaml

success_metrics:
  - "100% of plan fund lineups reviewed on a rolling 90-day cycle"
  - "High-severity findings surfaced to fiduciary committee within 24 hours of detection"
  - "Mean time-to-remediation for excessive-fee findings decreases by ≥30%"
  - "Zero repeat findings on the same fund across consecutive quarterly reviews"
  - "DOL examination preparation time decreases by ≥50% due to continuous monitoring"

tags:
  - compliance
  - erisa
  - fiduciary
  - fund-monitoring
  - fees
