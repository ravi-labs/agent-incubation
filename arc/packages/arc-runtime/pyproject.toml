[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc-runtime"
version = "0.1.0"
description = "Arc production runtime — RuntimeConfig.from_env() and RuntimeBuilder, the production mirror of arc-harness"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

# Lambda handler, Bedrock Agent adapter, Secrets Manager loader
aws = ["boto3>=1.34", "botocore>=1.34"]

[tool.hatch.build.targets.wheel]
packages = ["src/arc"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
