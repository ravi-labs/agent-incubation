[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc-orchestrators"
version = "0.1.0"
description = "Arc orchestrator adapters — swap between LangGraph, AgentCore, and Strands without changing agent code"
requires-python = ">=3.11"
dependencies = [
    "arc-core>=0.1.0",
]

[project.optional-dependencies]
langgraph   = ["langgraph>=0.2", "langchain-aws>=0.1"]
agentcore   = ["boto3>=1.34", "botocore>=1.34"]
strands     = ["strands-agents>=0.1"]
all         = ["arc-orchestrators[langgraph,agentcore,strands]"]

[tool.hatch.build.targets.wheel]
packages = ["src/arc"]
