[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc-eval"
version = "0.1.0"
description = "Arc evaluation framework — scenario-based testing for arc agents"
requires-python = ">=3.11"
dependencies = ["arc-core>=0.1.0"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.hatch.build.targets.wheel]
packages = ["src/arc"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
