[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc-platform"
version = "0.1.0"
description = "Arc web platform — FastAPI JSON backend serving two React frontends (arc-platform-ops for business users, arc-platform-dev for engineers)."
requires-python = ">=3.11"
dependencies = [
    "arc-core>=0.1.0",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "httpx>=0.27"]

[tool.hatch.build.targets.wheel]
packages = ["src/arc"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
