[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc-harness"
version = "0.1.0"
description = "Arc harness layer — local testing with synthetic fixtures, shadow mode, decision reports"
requires-python = ">=3.11"
dependencies = [
    "arc-core>=0.1.0",
    "pyyaml>=6.0",
    "tollgate>=1.4",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.hatch.build.targets.wheel]
packages = ["src/arc"]
