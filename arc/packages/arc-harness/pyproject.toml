[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc-harness"
version = "0.1.0"
description = "Arc harness layer — local testing with synthetic fixtures, shadow mode, decision reports"
requires-python = ">=3.11"
dependencies = [
    "arc-core>=0.1.0",
    "pyyaml>=6.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/arc"]
