[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc-cli"
version = "0.1.0"
description = "Arc command-line interface — agent scaffolding, validation, promotion, and registry submission"
requires-python = ">=3.11"
dependencies = [
    "arc-core>=0.1.0",
    "arc-runtime>=0.1.0",
    "click>=8.0",
    "pyyaml>=6.0",
]

# arc-platform is an optional install — adds `arc platform serve`.
# If missing, the platform command prints an install hint instead of crashing.

[project.scripts]
arc = "arc.cli.main:cli"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.hatch.build.targets.wheel]
packages = ["src/arc"]
