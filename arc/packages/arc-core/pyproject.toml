[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc-core"
version = "0.1.0"
description = "Arc governance engine — typed effects, policy evaluation, ControlTower, audit trail"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    "pydantic>=2.0",
    "tollgate>=1.4",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "ruff", "mypy"]

# Async HTTP gateway (arc.core.gateway.HttpGateway)
http = ["httpx>=0.27"]

# AWS-backed memory store (DynamoDBMemoryBackend) and other boto3-using primitives
aws = ["boto3>=1.34", "botocore>=1.34"]

[tool.hatch.build.targets.wheel]
packages = ["src/arc"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
