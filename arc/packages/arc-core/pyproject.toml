[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc-core"
version = "0.1.0"
description = "Arc governance engine — typed effects, policy evaluation, ControlTower, audit trail"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    "pydantic>=2.0",
    # Migration shim: arc-core still re-exports several modules from
    # agent-foundry (manifest, scaffold, gateway, ...). Each migration drops
    # one foundry import; the dep is removed when the last shim is gone.
    # arc.core.effects also imports foundry.tollgate.types.Effect to preserve
    # class identity for foundry's existing isinstance() checks; that switches
    # to canonical `tollgate` once foundry/tollgate/ is converted to a shim.
    "agent-foundry",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "ruff", "mypy"]

[tool.hatch.build.targets.wheel]
packages = ["src/arc"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
